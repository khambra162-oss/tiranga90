    align-items:center;
    padding:15px 0;
    border-bottom:1px solid #374151;
}

.setting-item:last-child{
    border-bottom:none;
}

button{
    background:#00e5ff;
    color:#000;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#00bcd4;
}

select{
    padding:8px;
    border-radius:6px;
}

</style>

</head>

<header>
