<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Customization</title>

<link rel="stylesheet" href="css/style.css">

<style>

.container{
    max-width:1100px;
    margin:40px auto;
    padding:20px;
}

.avatar-box{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    text-align:center;
}

.avatar{
    width:140px;
    height:140px;
    margin:auto;
    border-radius:50%;
    background:#00e5ff;
    color:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    font-weight:bold;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:#0f172a;
    padding:20px;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    text-align:center;
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 15px cyan;
}

button{
    margin-top:25px;
    padding:12px 30px;
    background:#00e5ff;
    color:#000;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

</style>

</head>
